spring:
  config:
    import: optional:file:.env[.properties]
  main:
    allow-bean-definition-overriding: true
  application:
    name: taskmanagement

  service:
    token:
      enabled: true

  # =============================
  # PostgreSQL Database Config
  # =============================
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    # ... keep hikari settings
    hikari:
      connectionTimeout: 20000
      maximumPoolSize: 5
  minimumIdle: 2
  idleTimeout: 600000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: false
    properties:
      hibernate:
        format_sql: true
      jdbc:
        time_zone: Asia/Kolkata

  # sql:
  #   init:
  #     schema-locations:
  #       - classpath:activiti.engine.schema.sql
  #     mode: always

  # =============================
  # MySQL Database Configuration
  # =============================
  # datasource:
  #   url: jdbc:mysql://192.168.3.144:3306/taskmanagement?createDatabaseIfNotExist=true
  #   username: app_user
  #   password: userpassword123
  #   driver-class-name: com.mysql.cj.jdbc.Driver
  #   hikari:
  #     connectionTimeout: 20000
  #     maximumPoolSize: 20

  # jpa:
  #   database-platform: org.hibernate.dialect.MySQL8Dialect
  #   hibernate:
  #     ddl-auto: update
  #   show-sql: true
  #   defer-datasource-initialization: false
  #   properties:
  #     hibernate:
  #       format_sql: true

  # =============================
  # Redis Configuration
  # =============================
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: 0
      lettuce:
        pool:
          max-active: 10
          max-idle: 8
          min-idle: 2
          max-wait: 5s

    # =============================
    # MongoDB Configuration
    # =============================
    mongodb:
      host: ${MONGO_HOST}
      port: ${MONGO_PORT}
      username: ${MONGO_USERNAME}
      password: ${MONGO_PASSWORD}
      authentication-database: ${MONGO_AUTH_DB}

  mongodb:
    client:
      settings:
        connection-pool:
          max-size: 500
          min-size: 10
          max-connection-idle-time: 10s
          max-wait-time: 5s

  # =============================
  # Kafka Configuration
  # =============================
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    properties:
      schema:
        registry:
          url: ${KAFKA_SCHEMA_REGISTRY_URL}
      specific:
        avro:
          reader: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      group-id: ${spring.application.name}-consumer-group
      auto-offset-reset: earliest

  # =============================
  # Security Configuration
  # =============================
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${IKON_JWT_ISSUER_URI}

# =============================
# IKON Platform Configurations
# =============================
ikon:
  dac:
    enabled: true
    bypass-roles: [PLATFORM_ADMIN, SUPER_ADMIN]
  user:
    agent: "IKON App Server"
  platform:
    rest: ${IKON_PLATFORM_URL}
  logger:
    enabled: false
  accessmanagement:
    init:
      file: ${BPMN_PROJECT_JSON}
  processengine:
    databaseSchemaUpdate: false
    bpmn:
      enabled: true
      path: ${BPMN_PATH}
  app:
    softwareId: ${IKON_SOFTWARE_ID}
    softwareVerion: 1
    softwareName: ${spring.application.name}
    softwareRepositoryName: taskmanagement
  job:
    max-pool-size: 100

# =============================
# Logging Configuration
# =============================
logging:
  level:
    com.ikon: DEBUG
  file:
    name: "../logs/${spring.application.name}-app.log"

# =============================
# Server Configuration
# =============================
server:
  address: ${SERVER_ADDRESS}
  port: ${SERVER_PORT}

# =============================
# Eureka (Optional)
# =============================
eureka:
  instance:
    ip-address: ${server.address}
    preferIpAddress: true
    instance-id: ${spring.cloud.client.ip-address}:${spring.application.name}:${server.port}
  client:
    register-with-eureka: ${EUREKA_REGISTER}
    fetch-registry: ${EUREKA_FETCH}
    service-url:
      default-zone: ${EUREKA_DEFAULT_ZONE}
