server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the SPA under the deployment sub-path
    location /apps/task-management/v1/ {
        try_files $uri $uri/ /apps/task-management/v1/index.html;
    }

    # Redirect bare path (no trailing slash) to trailing-slash version
    location = /apps/task-management/v1 {
        return 301 /apps/task-management/v1/;
    }

    # Health check endpoint for K8s probes
    location = / {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Cache Vite hashed assets aggressively
    location ~* /apps/task-management/v1/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Disable caching for index.html so new deployments are picked up
    location = /apps/task-management/v1/index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;
}
